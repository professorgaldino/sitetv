<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Ocorrência</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 15px;
    }
    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
      color: #555;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea {
      resize: none;
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }
    .checkbox-container input {
      width: auto;
      margin-right: 8px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #0056b3;
    }
    @media (max-width: 450px) {
      .container {
        padding: 20px;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Registro de Ocorrência</h2>
    <form id="ocorrenciaForm">
      <label for="aluno">Selecione o Aluno:</label>
      <select id="aluno" required>
        <option value="" disabled selected>Escolha um aluno</option>
        <option value="ADRYEL ALAN DA SILVA">ADRYEL ALAN DA SILVA</option>
        <option value="ANA LÍVIA DE SOUZA ROQUE">ANA LÍVIA DE SOUZA ROQUE</option>
        <option value="ARTHUR DA GUIA DE FARIAS">ARTHUR DA GUIA DE FARIAS</option>
        <option value="BRENO ANTONY SOUZA MELLO">BRENO ANTONY SOUZA MELLO</option>
        <option value="ELOÍSA AMARO MACEDO">ELOÍSA AMARO MACEDO</option>
        <option value="GABRIELA MARTINS TEIXEIRA">GABRIELA MARTINS TEIXEIRA</option>
        <option value="GUSTAVO HENRIQUE DE LIMA">GUSTAVO HENRIQUE DE LIMA</option>
        <option value="JÚLIA DE ARRUDA DE SOUZA">JÚLIA DE ARRUDA DE SOUZA</option>
        <option value="KATHELYN SOFIA DA SILVA MIRANDA">KATHELYN SOFIA DA SILVA MIRANDA</option>
        <option value="LÍVIA HELENA DA SILVA">LÍVIA HELENA DA SILVA</option>
        <option value="LUAN HANIEL COSTA">LUAN HANIEL COSTA</option>
        <option value="LUIZ CALEBE FERNANDES DE SOUZA">LUIZ CALEBE FERNANDES DE SOUZA</option>
        <option value="MARIA CLARA DOS SANTOS GOMES">MARIA CLARA DOS SANTOS GOMES</option>
        <option value="MARIANA CRISTINA DE MELO">MARIANA CRISTINA DE MELO</option>
        <option value="MATEUS HENRIQUE DOS SANTOS BRAMBILLA">MATEUS HENRIQUE DOS SANTOS BRAMBILLA</option>
        <option value="MIGUEL DE ALBUQUERQUE FERREIRA">MIGUEL DE ALBUQUERQUE FERREIRA</option>
        <option value="NÍCOLAS RENATO FARIA PEDROZO">NÍCOLAS RENATO FARIA PEDROZO</option>
        <option value="NOEMI MELO RODRIGUES PERALLI">NOEMI MELO RODRIGUES PERALLI</option>
        <option value="VICTOR GABRIEL DOS REIS CARVALHO">VICTOR GABRIEL DOS REIS CARVALHO</option>
        <option value="NATALIA LUIZA MALTA">NATALIA LUIZA MALTA</option>
        <option value="LUCAS PEDRO CARDOSO">LUCAS PEDRO CARDOSO</option>
        <option value="BIANCA ALESBÃO SILVA SOUZA">BIANCA ALESBÃO SILVA SOUZA</option>
        <option value="NATÁLYA GABRIELY AGUIAR DE SOUSA">NATÁLYA GABRIELY AGUIAR DE SOUSA</option>
        <option value="RODRIGO ALVES DA SILVA">RODRIGO ALVES DA SILVA</option>
        <option value="EVELYN AYALLA TEIXEIRA COSTA">EVELYN AYALLA TEIXEIRA COSTA</option>
        <option value="ADRIAN ARAUJO DE LIRA">ADRIAN ARAUJO DE LIRA</option>
        <option value="ANA LUIZA CHEREZIO">ANA LUIZA CHEREZIO</option>
        <option value="BRENDA EUFRÁSIO GALDINO DA SILVA">BRENDA EUFRÁSIO GALDINO DA SILVA</option>
        <option value="NÍCOLAS GABRIEL DE ALMEIDA">NÍCOLAS GABRIEL DE ALMEIDA</option>
        <option value="MARIA VITÓRIA ALVES">MARIA VITÓRIA ALVES</option>
      </select>

      <label for="tutor">Tutor do Aluno:</label>
      <input type="text" id="tutor" readonly>

      <label for="data">Data:</label>
      <input type="date" id="data" required>

      <label for="horario">Horário:</label>
      <input type="time" id="horario" required>

      <label for="professor">Nome do Professor:</label>
      <input type="text" id="professor" placeholder="Digite seu nome" required>

      <label for="descricao">Descrição da Ocorrência:</label>
      <textarea id="descricao" rows="3" placeholder="Descreva a ocorrência..." required></textarea>

      <label for="acao">Já foi tomada alguma ação a respeito? Qual?</label>
      <textarea id="acao" rows="2" placeholder="Informe a ação tomada, se houver." required></textarea>

      <div class="checkbox-container">
        <input type="checkbox" id="confirmacao" required>
        <label for="confirmacao">Atesto a veracidade das informações preenchidas.</label>
      </div>

      <button type="submit">Enviar Ocorrência</button>
    </form>
  </div>

  <script>
    const relacaoTutoria = {
      "ADRYEL ALAN DA SILVA": "Sem TUTOR",
      "ANA LÍVIA DE SOUZA ROQUE": "Sem TUTOR",
      "ARTHUR DA GUIA DE FARIAS": "Sem TUTOR",
      "BRENO ANTONY SOUZA MELLO": "Sem TUTOR",
      "ELOÍSA AMARO MACEDO": "Sem TUTOR",
      "GABRIELA MARTINS TEIXEIRA": "Sem TUTOR",
      "GUSTAVO HENRIQUE DE LIMA": "Sem TUTOR",
      "JÚLIA DE ARRUDA DE SOUZA": "Sem TUTOR",
      "KATHELYN SOFIA DA SILVA MIRANDA": "Sem TUTOR",
      "LÍVIA HELENA DA SILVA": "Sem TUTOR",
      "LUAN HANIEL COSTA": "Sem TUTOR",
      "LUIZ CALEBE FERNANDES DE SOUZA": "Sem TUTOR",
      "MARIA CLARA DOS SANTOS GOMES": "Sem TUTOR",
      "MARIANA CRISTINA DE MELO": "Sem TUTOR",
      "MATEUS HENRIQUE DOS SANTOS BRAMBILLA": "Sem TUTOR",
      "MIGUEL DE ALBUQUERQUE FERREIRA": "Sem TUTOR",
      "NÍCOLAS RENATO FARIA PEDROZO": "Sem TUTOR",
      "NOEMI MELO RODRIGUES PERALLI": "Sem TUTOR",
      "VICTOR GABRIEL DOS REIS CARVALHO": "Sem TUTOR",
      "NATALIA LUIZA MALTA": "Sem TUTOR",
      "LUCAS PEDRO CARDOSO": "Sem TUTOR",
      "BIANCA ALESBÃO SILVA SOUZA": "Sem TUTOR",
      "NATÁLYA GABRIELY AGUIAR DE SOUSA": "Sem TUTOR",
      "RODRIGO ALVES DA SILVA": "Sem TUTOR",
      "EVELYN AYALLA TEIXEIRA COSTA": "Sem TUTOR",
      "ADRIAN ARAUJO DE LIRA": "Sem TUTOR",
      "ANA LUIZA CHEREZIO": "Sem TUTOR",
      "BRENDA EUFRÁSIO GALDINO DA SILVA": "Sem TUTOR",
      "NÍCOLAS GABRIEL DE ALMEIDA": "Sem TUTOR",
      "MARIA VITÓRIA ALVES": "Sem TUTOR"
    };

    document.getElementById("aluno").addEventListener("change", function() {
      const alunoSelecionado = this.value;
      document.getElementById("tutor").value = relacaoTutoria[alunoSelecionado] || "";
    });

    document.getElementById("ocorrenciaForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const aluno = document.getElementById("aluno").value;
      const tutor = document.getElementById("tutor").value;
      const dataInput = document.getElementById("data").value;
      const horario = document.getElementById("horario").value;
      const professor = document.getElementById("professor").value;
      const descricao = document.getElementById("descricao").value;
      const acao = document.getElementById("acao").value;
      const confirmacao = document.getElementById("confirmacao").checked ? "Sim, atesto a veracidade das informações preenchidas." : "";
      const telefone = "5519990020650";

      const [ano, mes, dia] = dataInput.split("-");
      const dataFormatada = `${dia}/${mes}/${ano}`;

      let mensagem = `Registro de Ocorrência:\n\n` +
          `Turma: 1°A\n` +
          `Aluno: ${aluno}\n` +
          `Tutor: ${tutor}\n` +
          `Data: ${dataFormatada}\n` +
          `Horário: ${horario}\n` +
          `Professor: ${professor}\n` +
          `Descrição: ${descricao}\n` +
          `Ação Tomada: ${acao}\n\n` +
          `${confirmacao}`;

      const url = `https://api.whatsapp.com/send?phone=${telefone}&text=${encodeURIComponent(mensagem)}`;
      window.open(url, "_blank");
    });
  </script>
</body>
</html>
